{% extends 'base.html' %}
{% block title %}Configuración{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Configuración</h2>
  <a href="{{ url_for('admin.usuarios') }}" class="btn btn-secondary">← Usuarios</a>
</div>
<div class="form-card">
  <form method="POST">
    <p class="text-muted" style="margin-bottom:1.5rem">Nombres de las dos personas de la pareja. Se usan en toda la aplicación.</p>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre Persona 1</label>
        <input type="text" name="nombre_persona1" required value="{{ cfg.nombre_persona1 }}">
      </div>
      <div class="form-group">
        <label>Nombre Persona 2</label>
        <input type="text" name="nombre_persona2" required value="{{ cfg.nombre_persona2 }}">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
