{% extends 'base.html' %}
{% block title %}{{ 'Editar' if editando else 'Nuevo' }} usuario{% endblock %}
{% block content %}
<div class="page-header">
  <h2>{{ 'Editar usuario' if editando else 'Nuevo usuario' }}</h2>
  <a href="{{ url_for('admin.usuarios') }}" class="btn btn-secondary">← Volver</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" name="nombre" required value="{{ usuario.nombre if usuario else '' }}">
      </div>
      <div class="form-group">
        <label>Nombre de usuario *</label>
        <input type="text" name="username" required value="{{ usuario.username if usuario else '' }}" placeholder="sin espacios, ej: ana_garcia" autocomplete="off">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contraseña {% if not editando %}*{% else %}(dejar vacío para no cambiar){% endif %}</label>
        <input type="password" name="password" {% if not editando %}required{% endif %} placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select name="rol">
          <option value="usuario" {% if usuario and usuario.rol == 'usuario' %}selected{% endif %}>Usuario</option>
          <option value="admin" {% if usuario and usuario.rol == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Persona (opcional)</label>
        <select name="persona">
          <option value="">— Ninguna —</option>
          <option value="persona1" {% if usuario and usuario.persona == 'persona1' %}selected{% endif %}>{{ cfg.nombre_persona1 }}</option>
          <option value="persona2" {% if usuario and usuario.persona == 'persona2' %}selected{% endif %}>{{ cfg.nombre_persona2 }}</option>
        </select>
      </div>
      {% if editando %}
      <div class="form-group">
        <label>Estado</label>
        <div class="checkbox-group">
          <input type="checkbox" id="activo" name="activo" {% if usuario and usuario.activo %}checked{% endif %}>
          <label for="activo">Usuario activo</label>
        </div>
      </div>
      {% endif %}
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Guardar cambios' if editando else 'Crear usuario' }}</button>
      <a href="{{ url_for('admin.usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
