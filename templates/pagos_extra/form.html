{% extends 'base.html' %}
{% block title %}{{ 'Editar' if editando else 'Nuevo' }} pago extra{% endblock %}
{% block content %}
<div class="page-header">
  <h2>{{ 'Editar pago extra' if editando else 'Nuevo pago extra' }}</h2>
  <a href="{{ url_for('pagos_extra.lista') }}" class="btn btn-secondary">← Volver</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label for="descripcion">Descripción *</label>
        <input type="text" id="descripcion" name="descripcion" required
               value="{{ pago.descripcion if pago else '' }}" placeholder="Ej: Transferencia renta">
      </div>
      <div class="form-group">
        <label for="monto">Monto *</label>
        <input type="number" id="monto" name="monto" step="0.01" min="0.01" required
               value="{{ pago.monto if pago else '' }}" placeholder="0.00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="pagado_por">¿Quién pagó? *</label>
        <select id="pagado_por" name="pagado_por" required>
          <option value="">— Selecciona —</option>
          <option value="persona1" {% if pago and pago.pagado_por == 'persona1' %}selected{% endif %}>{{ cfg.nombre_persona1 }}</option>
          <option value="persona2" {% if pago and pago.pagado_por == 'persona2' %}selected{% endif %}>{{ cfg.nombre_persona2 }}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="recibido_por">¿Quién recibió? *</label>
        <select id="recibido_por" name="recibido_por" required>
          <option value="">— Selecciona —</option>
          <option value="persona1" {% if pago and pago.recibido_por == 'persona1' %}selected{% endif %}>{{ cfg.nombre_persona1 }}</option>
          <option value="persona2" {% if pago and pago.recibido_por == 'persona2' %}selected{% endif %}>{{ cfg.nombre_persona2 }}</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="mes">Mes *</label>
        <input type="month" id="mes" name="mes" required
               value="{{ pago.mes_str if editando and pago else (pago.mes if pago else '') }}"
               min="2024-12">
      </div>
    </div>
    <div class="form-group">
      <label for="notas">Notas (opcional)</label>
      <textarea id="notas" name="notas" rows="2" placeholder="Comentarios...">{{ pago.notas if pago else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Guardar cambios' if editando else 'Registrar pago' }}</button>
      <a href="{{ url_for('pagos_extra.lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
